TYPO3:
  CMS:
    Form:
      prototypes:
        standard:
          formElementsDefinition:
            Page:
              __inheritances:
                10: "TYPO3.CMS.Form.prototypes.standard.formElementsDefinition.Page"
              # Prevent successful submission on change
              variants:
                - identifier: skip-validation
                  condition: 'traverse(formValues, "skip-validation")  == 1'
                  renderingOptions:
                    skipValidation: 1
